name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: xcodebuild -version

      - name: Select an available iOS simulator
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; print(next(dev['udid'] for rt in sorted(d, reverse=True) if 'iOS' in rt for dev in d[rt] if 'iPhone' in dev['name']))")
          echo "Selected simulator UDID: $UDID"
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild test \
            -project RandomUser.xcodeproj \
            -scheme RandomUser \
            -destination "platform=iOS Simulator,id=$SIM_UDID" \
            CODE_SIGNING_ALLOWED=NO
